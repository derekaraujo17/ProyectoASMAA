<!--
MOLDE VACÍO DE LA TARJETA TIPO "PLAYLIST".

Estructura base: contenedor principal, espacio para la portada, título del mes y la lista del top 5.

IMPORTANTE: Usar identificadores claros (ej. id="titulo-mes" o id="cancion-1") para que Python sepa exactamente dónde buscar y reemplazar los textos más adelante.
-->

<div class="playlist">
    <img class="recuadros-playlist" src="{{URL_CANCION}}" alt="cancionTop1">
    <img class="recuadros-playlist" src="{{URL_ARTISTA}}" alt="artistaTop1">
    <p class="recuadros-playlist">{{EMOJI_VIBRA}}</p>
    <div class="recuadros-playlist reloj" style="--porcentaje: {{PORCENTAJE}}%;">
        <p>{{MINUTOS_TOTALES}} min</p>
    </div>
    <p class="mes-playlist">{{MES_ACTUAL}}</p> 
</div>
